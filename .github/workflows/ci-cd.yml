name: Payment Gateway CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    # Tests today are H2 + mocks (see application-test.yml); no Postgres/Redis services
    # needed here. Real-infra integration tests will live in `*IT` under Failsafe in 3c.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build, test, coverage gate
        run: ./mvnw clean verify -B
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: payment-core/target/site/jacoco/
      - name: Upload jar
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: payment-api-jar
          path: payment-api/target/payment-api-*.jar

  migration-validation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: payment_gateway
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Validate migrations against PostgreSQL
        run: >-
          ./mvnw -pl payment-api flyway:migrate -B
          -Dflyway.url=jdbc:postgresql://localhost:5432/payment_gateway
          -Dflyway.user=postgres
          -Dflyway.password=postgres

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy dependency scan (HIGH/CRITICAL fail)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: false
          trivyignores: .trivyignore

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  static-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Qodana Scan (advisory)
        uses: JetBrains/qodana-action@v2025.2
        continue-on-error: true
        env:
          Q_TEST_CONTINUE_ON_FAILURE: true

  image-build-scan:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t kimpay/payment-api:ci -f payment-api/Dockerfile .
      - name: Trivy image scan (advisory)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: kimpay/payment-api:ci
          severity: HIGH,CRITICAL
          exit-code: '0'
          format: sarif
          output: trivy-image.sarif
      - name: Upload image scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
